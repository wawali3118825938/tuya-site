<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上传投稿 - 广州大学城涂鸦档案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- 使用正确的 EmailJS SDK 版本 -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
    // 使用正确的初始化方法
    (function() {
        emailjs.init('jU9IXLb3WCBZ5p0rR');
    })();
</script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #8fa8c6;
  --primary-light: #c0d4e9;
  --dark-bg: #0f1014;
  --dark-card: #1a1c23;
  --dark-hover: #242730;
  --text-light: #e8e9ec;
  --text-muted: #9ca3af;
  --text-faint: #6b7280;
  --radius: 14px;
  --radius-sm: 10px;
  --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  --success: #10b981;
  --error: #ef4444;
}

body {
  font-family: "Noto Serif SC", "Inter", serif;
  background: var(--dark-bg);
  background-image: 
    url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23242730' fill-opacity='0.06' fill-rule='evenodd'/%3E%3C/svg%3E"),
    radial-gradient(circle at 10% 20%, rgba(80, 90, 110, 0.1) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(70, 80, 100, 0.08) 0%, transparent 40%);
  color: var(--text-light);
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
  line-height: 1.7;
  min-height: 100vh;
}

.navbar {
  position: sticky;
  top: 16px;
  background: rgba(26, 28, 35, 0.7);
  backdrop-filter: blur(12px);
  padding: 14px 20px;
  border-radius: var(--radius);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  z-index: 99;
  margin-bottom: 40px;
  border: 1px solid rgba(255,255,255,0.06);
}

.navbar a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 8px 14px;
  font-size: 15px;
  border-radius: var(--radius-sm);
  transition: var(--transition);
  font-weight: 400;
}

.navbar a:hover, .navbar a.active {
  background: var(--dark-hover);
  color: var(--primary-light);
}

.header {
  text-align: center;
  padding: 60px 20px;
  border-radius: var(--radius);
  margin-bottom: 40px;
  background: rgba(15, 16, 20, 0.4);
  border: 1px solid rgba(255,255,255,0.04);
}

.header h1 {
  font-size: 36px;
  font-weight: 500;
  margin-bottom: 12px;
  color: var(--primary-light);
  letter-spacing: 1px;
}

.header p {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 600px;
  margin: 0 auto 30px;
  font-weight: 300;
  letter-spacing: 0.5px;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
  padding: 20px;
  background: var(--dark-card);
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.04);
}

.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1.4rem;
  color: var(--dark-bg);
}

.user-details {
  flex: 1;
}

.user-details .name {
  font-size: 18px;
  font-weight: 500;
  color: var(--primary-light);
  margin-bottom: 4px;
}

.user-details .email {
  font-size: 14px;
  color: var(--text-muted);
}

.tabs {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  overflow: hidden;
  margin-bottom: 2px;
  border: 1px solid rgba(255,255,255,0.04);
  border-bottom: none;
}

.tab {
  flex: 1;
  padding: 16px;
  background: var(--dark-card);
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  border-bottom: 3px solid transparent;
  font-size: 15px;
  color: var(--text-muted);
}

.tab.active {
  background: rgba(143, 168, 198, 0.1);
  border-bottom-color: var(--primary);
  color: var(--primary-light);
}

.tab:hover:not(.active) {
  background: var(--dark-hover);
}

.tab-content {
  display: none;
  padding: 30px;
  background: var(--dark-card);
  border-radius: 0 0 var(--radius) var(--radius);
  border: 1px solid rgba(255,255,255,0.04);
  border-top: none;
}

.tab-content.active {
  display: block;
}

.upload-area {
  border: 2px dashed rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 60px 20px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 30px;
  background: rgba(255,255,255,0.02);
}

.upload-area:hover {
  border-color: var(--primary);
  background: rgba(143, 168, 198, 0.05);
}

.upload-icon {
  font-size: 48px;
  margin-bottom: 20px;
  opacity: 0.7;
  color: var(--primary-light);
}

.upload-area h3 {
  font-size: 20px;
  font-weight: 400;
  color: var(--text-light);
  margin-bottom: 8px;
}

.upload-hint {
  color: var(--text-faint);
  font-size: 14px;
  font-weight: 300;
}

.file-input {
  display: none;
}

.preview {
  display: none;
  margin-bottom: 30px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--dark-bg);
  border: 1px solid rgba(255,255,255,0.06);
}

.preview-image {
  width: 100%;
  max-height: 300px;
  object-fit: contain;
  display: block;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 14px;
  color: var(--text-light);
  margin-bottom: 8px;
  font-weight: 400;
}

.form-group label.required::after {
  content: " *";
  color: var(--error);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.form-grid .form-group.full {
  grid-column: 1 / -1;
}

input, select, textarea {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-light);
  font-family: "Inter", sans-serif;
  font-size: 15px;
  transition: var(--transition);
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  background: rgba(255,255,255,0.08);
}

textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}

.select-wrapper {
  position: relative;
}

.select-wrapper::after {
  content: "▼";
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 12px;
}

select {
  appearance: none;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
}

.btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: var(--dark-bg);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  font-family: "Inter", sans-serif;
  margin-top: 10px;
}

.btn:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.loading {
  display: none;
  text-align: center;
  padding: 40px 20px;
  background: var(--dark-card);
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.04);
  margin: 20px 0;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid var(--primary);
  border-radius: 50%;
  margin: 0 auto 20px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loading p {
  color: var(--text-muted);
  font-size: 15px;
}

.success {
  display: none;
  text-align: center;
  padding: 40px 20px;
  background: rgba(16, 185, 129, 0.1);
  border: 1px solid var(--success);
  border-radius: var(--radius);
  margin: 20px 0;
}

.success-icon {
  font-size: 48px;
  color: var(--success);
  margin-bottom: 20px;
}

.success h3 {
  font-size: 20px;
  color: var(--success);
  font-weight: 500;
  margin-bottom: 12px;
}

.success p {
  color: var(--text-muted);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 20px;
}

.success .btn {
  background: var(--success);
  color: white;
  max-width: 200px;
  margin: 0 auto;
}

.success .btn:hover {
  background: #0da271;
  color: white;
}

@media (max-width: 768px) {
  body {
    padding: 16px;
  }
  
  .header {
    padding: 40px 20px;
  }
  
  .header h1 {
    font-size: 28px;
  }
  
  .form-grid {
    grid-template-columns: 1fr;
  }
  
  .navbar {
    padding: 12px 16px;
  }
  
  .tab-content {
    padding: 20px;
  }
  
  .upload-area {
    padding: 40px 20px;
  }
}
</style>
</head>

<body>
<div class="navbar">
  <a href="index.html">返回首页</a>
  <a href="#photo" class="active">照片投稿</a>
  <a href="#article">文章投稿</a>
  <a href="login.html" style="margin-left: auto; color: #8fa8c6; font-weight: bold;">登出</a>
</div>

<section class="header">
  <h1>📤 上传投稿</h1>
  <p>分享您的涂鸦照片或投稿文章，让更多人看到广州大学城的街头艺术</p>
</section>

<div class="user-info">
  <div class="avatar" id="userAvatar">U</div>
  <div class="user-details">
    <div class="name" id="userName">加载中...</div>
    <div class="email" id="userEmail">正在获取用户信息</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('photo')">照片投稿</div>
  <div class="tab" onclick="showTab('article')">文章投稿</div>
</div>

<!-- 照片投稿 -->
<div id="photoTab" class="tab-content active">
  <div class="upload-area" onclick="document.getElementById('fileInput').click()" id="uploadBox">
    <div class="upload-icon">📸</div>
    <h3>点击或拖拽上传照片</h3>
    <p class="upload-hint">支持 JPG、PNG 格式，最大 10MB</p>
    <input type="file" id="fileInput" accept="image/*" class="file-input">
  </div>

  <div class="preview" id="preview">
    <img id="previewImage" class="preview-image" alt="照片预览">
  </div>

  <form id="photoForm" style="display: none;">
    <div class="form-grid">
      <div class="form-group">
        <label for="author" class="required">作品作者</label>
        <input type="text" id="author" placeholder="请输入作品作者姓名">
      </div>
      
      <div class="form-group">
        <label for="photographer" class="required">拍摄者</label>
        <input type="text" id="photographer" placeholder="拍摄者姓名" readonly>
      </div>
      
      <div class="form-group">
        <label for="category" class="required">地点类别</label>
        <select id="category">
          <option value="">请选择地点类别</option>
          <option value="学校">学校</option>
          <option value="村落">村落</option>
          <option value="街道/公共区域">街道/公共区域</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="specificLocation" class="required">具体地点</label>
        <select id="specificLocation">
          <option value="">请先选择类别</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="findTime" class="required">拍摄时间</label>
        <input type="date" id="findTime">
      </div>
      
      <div class="form-group">
        <label for="location" class="required">详细位置</label>
        <input type="text" id="location" placeholder="例如：图书馆旁围墙、食堂后墙等">
      </div>
      
      <div class="form-group full">
        <label for="description">作品描述</label>
        <textarea id="description" placeholder="请简要描述这张照片的故事、背景或意义..."></textarea>
      </div>
    </div>
    
    <button type="button" class="btn" onclick="uploadPhoto()">提交照片投稿</button>
  </form>
</div>

<!-- 文章投稿 -->
<div id="articleTab" class="tab-content">
  <form id="articleForm">
    <div class="form-grid">
      <div class="form-group full">
        <label for="articleType" class="required">文章类别</label>
        <select id="articleType">
          <option value="">请选择文章类别</option>
          <option value="涂鸦童话">涂鸦童话</option>
          <option value="我们的故事">我们的故事</option>
        </select>
      </div>
      
      <div class="form-group full">
        <label for="articleTitle" class="required">文章标题</label>
        <input type="text" id="articleTitle" placeholder="请输入文章标题">
      </div>
      
      <div class="form-group">
        <label for="articleAuthor" class="required">文章作者</label>
        <input type="text" id="articleAuthor" placeholder="请输入文章作者姓名">
      </div>
      
      <div class="form-group full">
        <label for="articleContent" class="required">文章内容</label>
        <textarea id="articleContent" placeholder="请输入文章内容..." rows="8"></textarea>
      </div>
    </div>
    
    <button type="button" class="btn" onclick="uploadArticle()">提交文章投稿</button>
  </form>
</div>

<!-- 加载动画 -->
<div id="loading" class="loading">
  <div class="loading-spinner"></div>
  <p>正在提交中，请稍候...</p>
</div>

<!-- 成功提示 -->
<div id="success" class="success">
  <div class="success-icon">✓</div>
  <h3 id="successMessage">提交成功！</h3>
  <p>管理员会尽快审核您的投稿，审核结果将通过邮件通知您。</p>
  <button class="btn" onclick="continueUpload()">继续投稿</button>
</div>

<script>
// 检查登录状态
window.onload = function() {
  const userData = localStorage.getItem('guangzhou_user');
  if (!userData) {
    alert('请先登录！');
    window.location.href = 'login.html';
    return;
  }

  // 显示用户信息
  const user = JSON.parse(userData);
  document.getElementById('userName').textContent = user.nickname || '用户';
  document.getElementById('userAvatar').textContent = (user.nickname || 'U').charAt(0).toUpperCase();
  document.getElementById('userEmail').textContent = user.email || '已登录';
  document.getElementById('photographer').value = user.nickname || '';
  document.getElementById('findTime').valueAsDate = new Date();
  document.getElementById('photoForm').style.display = 'none';

  // 初始化地点选择
  initLocationSelect();
  
  // 设置拖拽功能
  setupDragDrop();
  
  // 添加调试日志
  console.log('EmailJS 初始化状态:', typeof emailjs);
  console.log('EmailJS 版本:', emailjs.VERSION);
};

// 地点类别和具体地点的映射
const locationMapping = {
  '学校': [
    '中山大学', '华南理工大学', '华南师范大学', '广东工业大学', '广州美术学院',
    '广州大学', '广东外语外贸大学', '广东药科大学', '星海音乐学院', 
    '广州中医药大学', '其他高校'
  ],
  '村落': [
    '贝岗村', '南亭村', '北亭村', '其他村落'
  ],
  '街道/公共区域': [
    '中心湖', '大学城外环', '大学城新天地', '岭南印象园', 
    '大学城中环', '大学城内环', '其他街道'
  ]
};

function initLocationSelect() {
  const categorySelect = document.getElementById('category');
  const locationSelect = document.getElementById('specificLocation');
  
  categorySelect.addEventListener('change', function() {
    const category = this.value;
    locationSelect.innerHTML = '<option value="">请选择具体地点</option>';
    
    if (category && locationMapping[category]) {
      locationMapping[category].forEach(location => {
        const option = document.createElement('option');
        option.value = location;
        option.textContent = location;
        locationSelect.appendChild(option);
      });
    }
  });
}

function setupDragDrop() {
  const uploadBox = document.getElementById('uploadBox');
  const fileInput = document.getElementById('fileInput');

  uploadBox.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) showPreview(e.target.files[0]);
  });

  uploadBox.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = 'var(--primary)';
    uploadBox.style.backgroundColor = 'rgba(143, 168, 198, 0.08)';
  });

  uploadBox.addEventListener('dragleave', () => {
    uploadBox.style.borderColor = 'rgba(255,255,255,0.1)';
    uploadBox.style.backgroundColor = 'rgba(255,255,255,0.02)';
  });

  uploadBox.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = 'rgba(255,255,255,0.1)';
    uploadBox.style.backgroundColor = 'rgba(255,255,255,0.02)';
    if (e.dataTransfer.files[0]) showPreview(e.dataTransfer.files[0]);
  });
}

function showTab(tabName) {
  // 隐藏所有选项卡内容和移除active状态
  document.querySelectorAll('.tab-content').forEach(content => {
    content.classList.remove('active');
  });
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  
  // 显示选中的选项卡
  if (tabName === 'photo') {
    document.getElementById('photoTab').classList.add('active');
    document.querySelector('.tab:nth-child(1)').classList.add('active');
  } else {
    document.getElementById('articleTab').classList.add('active');
    document.querySelector('.tab:nth-child(2)').classList.add('active');
  }
}

// 预览照片
function showPreview(file) {
  if (!file.type.startsWith('image/')) {
    alert('请选择图片文件！');
    return;
  }
  
  if (file.size > 10 * 1024 * 1024) {
    alert('图片太大，请选择小于10MB的图片');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('previewImage').src = e.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('photoForm').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// 上传照片
function uploadPhoto() {
  const author = document.getElementById('author').value;
  const photographer = document.getElementById('photographer').value;
  const category = document.getElementById('category').value;
  const specificLocation = document.getElementById('specificLocation').value;
  const findTime = document.getElementById('findTime').value;
  const location = document.getElementById('location').value;
  const description = document.getElementById('description').value;
  const file = document.getElementById('fileInput').files[0];
  
  // 验证
  if (!author || !photographer || !category || !specificLocation || !findTime || !location) {
    alert('请填写所有带*的信息！');
    return;
  }
  
  if (!file) {
    alert('请先选择照片！');
    return;
  }
  
  // 显示加载中
  document.getElementById('loading').style.display = 'block';
  document.getElementById('photoForm').style.display = 'none';
  
  // 读取照片
  const reader = new FileReader();
  reader.onload = function(e) {
    const imageData = e.target.result;
    
    // 获取用户信息
    const userData = localStorage.getItem('guangzhou_user');
    const user = userData ? JSON.parse(userData) : { nickname: '匿名', email: '' };
    
    // 准备数据
    const submissionData = {
      id: Date.now(),
      type: 'photo',
      nickname: user.nickname,
      email: user.email,
      imageData: imageData,
      category: category,
      specificLocation: specificLocation,
      location: location,
      author: author,
      photographer: photographer,
      find_time: findTime,
      description: description || '无',
      status: '待审核',
      submission_time: new Date().toLocaleString('zh-CN')
    };
    
    // 保存到待审核列表
    const pending = JSON.parse(localStorage.getItem('guangzhou_pending')) || [];
    pending.push(submissionData);
    localStorage.setItem('guangzhou_pending', JSON.stringify(pending));
    
    // 发送邮件通知
    sendPhotoEmail({
      nickname: user.nickname,
      email: user.email,
      category: category,
      specificLocation: specificLocation,
      location: location,
      author: author,
      photographer: photographer,
      find_time: findTime,
      description: description || '无',
      submission_time: new Date().toLocaleString('zh-CN')
    });
  };
  reader.readAsDataURL(file);
}

// 上传文章

  const articleAuthor = document.getElementById('articleAuthor').value;
  const articleContent = document.getElementById('articleContent').value;
  
  // 验证
  if (!articleType || !articleTitle || !articleAuthor || !articleContent) {
    alert('请填写所有带*的信息！');
    return;
  }
  
  // 显示加载中
  document.getElementById('loading').style.display = 'block';
  document.getElementById('articleForm').style.display = 'none';
  
  // 获取用户信息
  const userData = localStorage.getItem('guangzhou_user');
  const user = userData ? JSON.parse(userData) : { nickname: '匿名', email: '' };
  
  // 准备数据
  const submissionData = {
    id: Date.now(),
    type: 'article',
    nickname: user.nickname,
    email: user.email,
    article_type: articleType,
    title: articleTitle,
    article_author: articleAuthor,
    content: articleContent,
    status: '待审核',
    submission_time: new Date().toLocaleString('zh-CN')
  };
  
  // 保存到待审核列表
  const pending = JSON.parse(localStorage.getItem('guangzhou_pending')) || [];
  pending.push(submissionData);
  localStorage.setItem('guangzhou_pending', JSON.stringify(pending));
  
  // 发送邮件通知
  sendArticleEmail({
    nickname: user.nickname,

    type: articleType,

    content: articleContent.substring(0, 500) + (articleContent.length > 500 ? '...' : ''),
    submission_time: new Date().toLocaleString('zh-CN')
  });
}

// 显示成功信息
function showSuccess(message) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('successMessage').textContent = message;
  document.getElementById('success').style.display = 'block';
  
  // 3秒后自动滚动到成功提示
  setTimeout(() => {
    document.getElementById('success').scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

// 继续投稿
function continueUpload() {
  document.getElementById('success').style.display = 'none';
  document.getElementById('photoForm').style.display = 'block';
  document.getElementById('articleForm').style.display = 'block';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('fileInput').value = '';
  
  // 重置表单
  document.getElementById('author').value = '';
  document.getElementById('description').value = '';
  document.getElementById('articleTitle').value = '';
  document.getElementById('articleAuthor').value = '';
  document.getElementById('articleContent').value = '';
  document.getElementById('articleType').selectedIndex = 0;
  document.getElementById('category').selectedIndex = 0;
  document.getElementById('specificLocation').innerHTML = '<option value="">请先选择类别</option>';
  
  // 滚动到顶部
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
